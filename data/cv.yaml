            Seul développeur au sein d'une équipe d'ops, j'ai :
             * Poussé à concevoir des APIs orientées utilisateur pour les bibliothèques de l'équipe
             * Contribué aux composants d'observabilité (dont open-source, comme BigGraphite par exemple)
             * Promu les bonnes pratiques de développement (conception, code, tests et revues)
