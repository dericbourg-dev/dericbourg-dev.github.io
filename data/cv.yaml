# yaml-language-server: $schema=
header:
  name: Alban Dericbourg
  title:
    fr: Ingénieur logiciel senior (indépendant)
    en: Freelance Senior Software Engineer
  summary:
    fr: >-
      Ingénieur logiciel senior, 15 ans d'expérience, notamment au sein de trois licornes
      françaises (Criteo, BlaBlaCar, Mirakl). Guidé par le problème à résoudre et la valeur
      pour les utilisateurs, je conçois et fiabilise des services back-end dans des systèmes
      distribués à fort trafic, aussi à l'aise sur du code hérité que sur un projet parti de
      zéro. Expertise marquée en observabilité et en fiabilité (SLO / SRE), et en pilotage de
      projets transverses. Je facilite aussi la coopération au sein des équipes.
      Basé à la campagne entre Poitiers et Angoulême, je privilégie le télétravail, tout en me
      déplaçant volontiers : le lien avec mes collègues compte pour moi.
    en: >-
      Senior software engineer with 15 years of experience, notably across three French
      unicorns (Criteo, BlaBlaCar, Mirakl). Driven by the problem to solve and the value for
      users, I design and harden back-end services in high-traffic distributed systems, as
      comfortable with legacy code as with a greenfield project. Strong expertise in
      observability and reliability (SLO / SRE), and in driving cross-team projects. I also
      help teams cooperate more smoothly. Based in the countryside between Poitiers and Angoulême,
      I prefer remote-first missions, but I'm glad to travel on-site: staying connected with my
      colleagues matters to me.

experiences:
  - company: Mirakl
    location: Paris
    url: https://www.mirakl.com
    roles:
      - role:
          fr: Ingénieur logiciel senior (indépendant)
          en: Senior Software Engineer (freelance)
        department: Connect (post-sales)
        start: "2026-04"
        description:
          fr: |
            Mirakl Connect est le réseau B2B reliant opérateurs et vendeurs. L'équipe _post-sales_ y possède le cycle de vie des commandes (fort volume, système distribué).

            Intégré en renfort de l'équipe, j'ai pris l'initiative d'élever le niveau d'exigence sur la conception et la livraison :
             * Refonte du processus de design doc pour couvrir des angles morts récurrents (capacité / volumétrie, observabilité, tests) et recentrer les revues sur les objectifs et les arbitrages
             * Adoption de templates structurés, avec des indications par section
             * Conception de _skills_ IA qui restructurent les design docs pour les rendre plus lisibles et actionnables, réduisant les allers-retours en revue
          en: |
            Mirakl Connect is the B2B network connecting operators and sellers. The post-sales team owns the order lifecycle there (high-volume, distributed system).

            Joined to reinforce the team, I took the initiative to raise the engineering bar on design and delivery:
             * Reworked the design-doc process to close recurring blind spots (capacity / volumetry, observability, testing) and refocus reviews on goals and trade-offs
             * Drove adoption of structured templates with inline guidance per section
             * Built AI skills that restructure design docs for readability and actionability, cutting review back-and-forth
        tags: [Java, SpringBoot, PostgreSQL, Kafka, AI, Datadog]
      - role:
          fr: Ingénieur logiciel senior (indépendant)
          en: Senior Software Engineer (freelance)
        department: MPI
        start: "2025-11"
        end: "2026-03"
        description:
          fr: |
            Connecteur Mirakl ↔ Shopify pour les opérateurs de plateforme.

            Livraison d'un middleware entre Shopify et la plateforme Mirakl permettant aux propriétaires de boutiques Shopify d'ouvrir leur boutique à des vendeurs tiers.
             * Conception et implémentation du support de l'internationalisation (i18n) sur l'ensemble du connecteur
             * Pilotage de bout en bout de la mise en place des SLO : de la conception à la conduite du changement et à l'adoption par l'équipe
          en: |
            Mirakl ↔ Shopify connector for platform operators.

            Shipped a middleware between Shopify and the Mirakl platform, letting Shopify shop owners open their store to third-party sellers.
             * Designed and implemented internationalization (i18n) support across the connector
             * Led SLO rollout end-to-end — from design through change management and team adoption
        tags: [Java, SpringBoot, PostgreSQL, Shopify APIs, Mirakl Platform, Datadog]
    extra:
      - topic: 
          fr: Détection de changement cassants d'API (OpenAPI)
          en: OpenAPI breaking change detection
        start: 2026-04
        description:
          fr: |
            Mise en place d'outillage automatisé pour évaluer les changements dans un contrat OpenAPI, évaluer leur impact et produire un rapport de changements.

            Comprend la possibilité de bloquer un pipeline Github Actions lorsqu'un changement cassant est détecté.

            La solution repose sur l'outil open-source [oasdiff](https://github.com/oasdiff/oasdiff).
          en: |
            Setup automated tooling to evaluate changes in an OpenAPI contract, assess the impact and produce a change report.

            Includes the ability to block a Github Action pipeline when a breaking change is detected.

            The solution is based on the [oasdiff](https://github.com/oasdiff/oasdiff) open-source tool.
  - company: BlaBlaCar
    location: Paris
    url: https://www.blablacar.com
    roles:
      - role:
          fr: Ingénieur logiciel senior backend
          en: Senior Backend Software Engineer
        department: Search
        start: "2021-04"
        end: "2025-10"
        description:
          fr: |
            Équipe full-stack — expérience de recherche côté passager, de l'envie de voyager au choix du trajet le plus pertinent selon ses préférences.

             * Pilotage de projets produit de la découverte au déploiement, dont des programmes de 9 mois impliquant 4 équipes
             * Refonte de l'architecture de recherche pour l'adapter à l'échelle de l'entreprise et à sa trajectoire multimodale, puis coordination de la migration progressive — sans réécriture _big-bang_ (#NoRewrite)
             * Pionnier des SLO dans l'équipe : en binôme avec l'équipe SRE, mise en place des premiers SLO techniques puis des Feature SLO pour modéliser plus finement l'expérience utilisateur ; contribution à l'embarquement d'autres équipes
             * Amélioration continue de la fiabilité : renforcement de l'observabilité des services en production et du processus de conception des nouveaux services
             * Lancement des Open Spaces (« Forum ouvert ») de l'équipe backend pour renforcer la coopération entre ingénieurs
             * Contribution quotidienne à la livraison de l'équipe
          en: |
            Full-stack team — passenger-side search experience, from the will to travel to choosing the most relevant ride for one's preferences.

             * Drove product projects from discovery to rollout, including 9-month programs spanning 4 teams
             * Revamped the search architecture to fit company scale and its multimodal roadmap, then coordinated a progressive migration — no big-bang rewrite (#NoRewrite)
             * Pioneered SLOs in the team: paired with the SRE team to ship the first technical SLOs, then Feature SLOs for sharper user-experience modeling; helped onboard other teams
             * Continuously improved reliability: strengthened production observability and the design process for new services
             * Launched the backend team's Open Spaces ("Forum ouvert") to boost cooperation between engineers
             * Contributed to the team's day-to-day delivery
        tags: [Java, SpringBoot, Elasticsearch, SLO, Datadog, Kubernetes]
      - role:
          fr: Ingénieur logiciel senior backend
          en: Senior Backend Software Engineer
        department: Monetize
        start: "2019-09"
        end: "2021-04"
        description:
          fr: |
            Équipe backend, en collaboration étroite avec les équipes frontend — calcul des frais de service passagers et orchestration du tunnel d'achat.

             * Extraction de services de monétisation autonomes hors du monolithe historique, et diffusion des bonnes pratiques d'architecture et de conception dans l'équipe
             * Impulsion d'une démarche SRE, centrée sur la réduction du bruit et de la fatigue d'alerte en astreinte
             * Pilotage de la migration de Fleet/Rocket vers Docker/Kubernetes sur le périmètre de l'équipe
             * Mission transverse d'optimisation des performances (équipe, outillage, applications)
             * Mentorat d'un ingénieur junior
          en: |
            Backend team working closely with frontend teams — computing carpool passenger fees and orchestrating the purchase flow.

             * Extracted standalone monetization services out of the legacy monolith, and spread architecture and code-design best practices across the team
             * Drove an SRE approach focused on reducing alert noise and on-call fatigue
             * Led the migration from Fleet/Rocket to Docker/Kubernetes in the team's scope
             * Cross-cutting mission on performance (team, tooling, applications)
             * Mentored a junior engineer
        tags: [Java, SpringBoot, MariaDB, Kubernetes, Prometheus, Grafana]
    extra:
      - topic:
          fr: Refonte de l'entretien de recrutement backend
          en: Backend hiring interview revamp
        start: "2021"
        description:
          fr: |
            J'ai piloté la définition du nouvel exercice de recrutement backend (live coding), avec 6 autres ingénieurs contributeurs. Nous avons mis l'accent sur l'équité de l'exercice et l'avons conçu pour maximiser l'égalité des chances.

            L'entretien est conçu pour ressembler au quotidien chez BlaBlaCar et favorise fortement le travail en équipe, ce qui permet d'évaluer les soft skills.
          en: |
            I led the definition of the new backend hiring exercise (live coding), with 6 other contributing engineers. We focused on the exercise's fairness and designed it to maximize equality of chances.

            The interview is designed to feel like a day-to-day job at BlaBlaCar and heavily promotes teamwork, which helps assessing soft skills.
