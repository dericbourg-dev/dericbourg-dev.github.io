            Team in charge of observability tools (logging, metrics, distributed tracing)

            As the only developer in the team among ops, I:
             * Pushed to design user-oriented APIs for the team's libraries
             * Contributed to observability components (including open-source, like BigGraphite for instance)
             * Promoted development best practices (designing, coding, testing and reviewing)
             * Organized Scala workshops to ramp-up my teammates on this language
      - role:
          fr: Ingénieur logiciel
          en: Software engineer
        department: Scalability
        start: "2017"
        end: "2018"
        description:
          fr: |
            Interface entre les équipes SRE et les équipes produit, équipe centrée sur la découverte de services et les métriques.

            En tant que membre de cette équipe, j'ai :
             * Piloté la migration d'un outil maison d'agrégation de métriques vers Prometheus (communication et synchronisation avec les autres équipes incluses)
             * Contribué à la définition et à la mise en production d'un moyen d'identifier de manière unique une application du point de vue du code
             * Assuré du support sur les problématiques JVM
