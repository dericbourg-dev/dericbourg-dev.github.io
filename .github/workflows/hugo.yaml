name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(cat .hugo-version)" >> $GITHUB_OUTPUT

      - name: Install Hugo CLI
        env:
          HUGO_VERSION: ${{ steps.hugo-version.outputs.version }}
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Read WeasyPrint version
        id: weasyprint-version
        run: echo "version=$(cat .weasyprint-version)" >> $GITHUB_OUTPUT

      - name: Install WeasyPrint
        env:
          WEASYPRINT_VERSION: ${{ steps.weasyprint-version.outputs.version }}
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 fonts-dejavu-core
          pip install --break-system-packages "weasyprint==${WEASYPRINT_VERSION}"

      - name: Build with Hugo and generate PDFs
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Paris
        run: sh scripts/build.sh --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
